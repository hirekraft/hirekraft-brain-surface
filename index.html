<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brain · Command Center — HireKraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14181d; --ink-2:#1c222a; --panel:#20272f; --panel-2:#262e38; --line:#333d49;
    --paper:#f4f2ec; --muted:#8a97a6; --muted-2:#5f6b78;
    --sage:#6f9e86; --amber:#e8a13c; --sky:#6ea8c9; --violet:#9a8fd0;
    --radius:14px; --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 10px 30px -12px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #212a33 0%, transparent 60%), var(--ink);
    color:var(--paper); font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    line-height:1.45; padding:28px 20px 80px;
  }
  .wrap{max-width:1080px;margin:0 auto}
  a{color:inherit}
  .mast{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.01em;margin:0}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 4px rgba(111,158,134,.16);align-self:center}
  .brand .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);letter-spacing:.02em}
  .stamp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2)}
  .band{margin-top:18px;border:1px solid var(--line);border-radius:var(--radius);background:linear-gradient(180deg,var(--panel),var(--ink-2));padding:20px 22px;box-shadow:var(--shadow)}
  .band .row1{display:flex;align-items:baseline;gap:26px;flex-wrap:wrap}
  .stat{display:flex;align-items:baseline;gap:9px}
  .stat b{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:-.02em}
  .stat span{font-size:13px;color:var(--muted)}
  .stat.warn b{color:var(--amber)}
  .cap{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-size:14px;color:var(--paper)}
  .cap .lead{color:var(--sage);font-weight:600}
  .cap .lead.no{color:var(--muted)}
  .cap p{margin:2px 0}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin:34px 2px 12px;display:flex;align-items:center;gap:10px}
  .eyebrow::after{content:"";height:1px;flex:1;background:var(--line)}
  .todo{display:grid;gap:10px}
  .todo .card{display:flex;align-items:center;gap:14px;border:1px solid #4a3c22;border-left:4px solid var(--amber);background:linear-gradient(180deg,#2a2318,#221d14);border-radius:12px;padding:13px 16px;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease}
  .todo .card:hover{transform:translateY(-1px);box-shadow:0 12px 24px -14px rgba(0,0,0,.7)}
  .todo .kind{font-family:'JetBrains Mono',monospace;font-size:10px;color:#c99a4e;border:1px solid #5a4a2b;border-radius:6px;padding:3px 7px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
  .todo .body{flex:1;min-width:0}
  .todo .name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px}
  .todo .reason{font-size:13px;color:#d8c39a;margin-top:1px}
  .todo .go{font-size:20px;color:var(--amber);opacity:.8}
  .todo.empty{border:1px dashed var(--line);border-radius:12px;padding:16px;color:var(--muted);font-size:14px;text-align:center;background:var(--ink-2)}
  .group{margin-bottom:6px}
  .grouphead{display:flex;align-items:baseline;gap:10px;margin:26px 2px 12px}
  .grouphead h2{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin:0}
  .grouphead .count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2)}
  .grouphead .hint{font-size:12px;color:var(--muted-2);margin-left:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  .src{border:1px solid var(--line);border-radius:12px;background:var(--panel);padding:14px 15px;position:relative;transition:border-color .12s ease}
  .src.rec{opacity:.72;background:var(--ink-2)}
  .src.rec:hover{opacity:1}
  .src.attn{border-color:#5a4a2b;box-shadow:0 0 0 1px #5a4a2b, 0 10px 26px -16px rgba(0,0,0,.7)}
  .src.attn::before{content:"";position:absolute;left:-1px;top:12px;bottom:12px;width:3px;border-radius:3px;background:var(--amber)}
  .src.off{opacity:.5}
  .src .top{display:flex;align-items:flex-start;gap:10px}
  .src .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;letter-spacing:-.01em;word-break:break-word}
  .src .via{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);margin-top:2px}
  .pill{margin-left:auto;font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 7px;border-radius:20px;white-space:nowrap;border:1px solid var(--line);color:var(--muted)}
  .pill.company{color:var(--sky);border-color:#2f4a58}
  .pill.personal{color:var(--violet);border-color:#443f5e}
  .src .came{font-size:14px;margin-top:11px;color:var(--paper)}
  .src .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 7px}
  .tag.live{color:var(--sage);border-color:#33463d}
  .tag.frozen{color:#c98f6e;border-color:#4d3a30}
  .tag.rw{color:var(--sky);border-color:#2f4a58}
  .src .fails{margin-top:10px;display:grid;gap:5px}
  .fail{font-size:12.5px;display:flex;gap:8px;align-items:baseline}
  .fail .n{font-family:'JetBrains Mono',monospace;font-weight:500}
  .fail.block .n{color:var(--amber)} .fail.block{color:#d8c39a}
  .fail.soft{color:var(--muted-2)}
  .fail a{color:var(--amber);text-decoration:underline;text-underline-offset:2px;cursor:pointer;font-size:12px}
  .src .foot{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line)}
  .fresh{font-size:12px;color:var(--muted-2);font-family:'JetBrains Mono',monospace}
  .refresh{margin-left:auto;font-size:12px;color:var(--paper);background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;transition:background .12s}
  .refresh:hover{background:#2f3946}
  .refresh:disabled{opacity:.6;cursor:default}
  .refresh .spin{width:11px;height:11px;border:2px solid var(--muted-2);border-top-color:var(--paper);border-radius:50%;display:none}
  .refresh.loading .spin{display:inline-block;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .frozen-note{margin-left:auto;font-size:12px;color:#c98f6e}
  .addstrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:14px}
  .add{border:1px dashed var(--line);border-radius:12px;background:transparent;color:var(--paper);padding:16px 14px;text-align:left;cursor:pointer;transition:border-color .12s,background .12s}
  .add:hover{border-color:var(--sage);background:var(--ink-2)}
  .add .t{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px}
  .add .d{font-size:12px;color:var(--muted-2);margin-top:3px}
  .sov{position:sticky;bottom:0;margin:36px -20px -80px;padding:14px 20px;background:linear-gradient(180deg,rgba(20,24,29,0),var(--ink) 40%);display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap}
  .sov .lock{font-size:13px;color:var(--sage);display:flex;align-items:center;gap:8px}
  .sov .req{font-size:13px;color:var(--muted);border-left:1px solid var(--line);padding-left:12px}
  .sov .req a{color:var(--paper);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
  .gaps{margin-top:22px;font-size:12px;color:var(--muted-2);border-top:1px dashed var(--line);padding-top:12px}
  .gaps b{color:var(--muted);font-weight:600}
  .gaps ul{margin:6px 0 0;padding-left:18px}
  .loading-screen{display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 0;color:var(--muted)}
  .loading-screen .brainpulse{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 50% 40%,var(--sage),#2c3a33);box-shadow:0 0 0 0 rgba(111,158,134,.5);animation:pulse 1.6s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(111,158,134,.4)}100%{box-shadow:0 0 0 26px rgba(111,158,134,0)}}
  .err{border:1px solid #5a2b2b;background:#2a1a1a;color:#e2b4b4;border-radius:12px;padding:16px;font-size:14px}
  @media (max-width:520px){body{padding:20px 14px 80px} .stat b{font-size:24px} .grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="mast">
    <div class="brand">
      <span class="dot" id="brandDot"></span>
      <h1>Brain · Command Center</h1>
      <span class="sub">HireKraft</span>
    </div>
    <div class="stamp" id="stamp">reading your brain…</div>
  </div>
  <div id="root">
    <div class="loading-screen">
      <div class="brainpulse"></div>
      <div>Reading your brain, live…</div>
    </div>
  </div>
</div>
<script>
const FN = "https://uvdoompnnypmneyrvtas.supabase.co/functions/v1/brain-command-center";
const ANON = "sb_publishable_joP87JJiePfN3k1uPoxxVA_DLGT1zv5";
const GROUP_META = {
  email:   {title:"Email",            hint:"mailboxes the brain reads"},
  systems: {title:"Systems",          hint:"QuickBooks, Wise and other tools"},
  files:   {title:"Files & folders",  hint:"drives and shared folders"},
  loose:   {title:"Loose files",      hint:"one-off imports — the junk drawer"},
};
function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function ago(iso){
  if(!iso) return "never synced";
  const d=new Date(iso), s=(Date.now()-d.getTime())/1000;
  if(s<90) return "just now";
  if(s<3600) return Math.round(s/60)+"m ago";
  if(s<86400) return Math.round(s/3600)+"h ago";
  return Math.round(s/86400)+"d ago";
}
async function call(body){
  const r = await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json","apikey":ANON,"Authorization":"Bearer "+ANON},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("brain returned "+r.status);
  return r.json();
}
function pill(cat){
  if(cat===2||cat===3) return `<span class="pill personal">personal · your data</span>`;
  return `<span class="pill company">company-owned</span>`;
}
function failLines(s){
  if(!s.fail_reasons || !s.fail_reasons.length) return "";
  const rows = s.fail_reasons.map(f=>{
    const block = !f.retryable && f.bucket!=="duplicate";
    const cls = block ? "block" : "soft";
    const see = (f.bucket==="password_protected"||f.bucket==="unreadable_file"||f.bucket==="ingestion_bug")
      ? ` <a data-see="${esc(s.id)}">see which</a>` : "";
    return `<div class="fail ${cls}"><span class="n">${f.count}</span><span>${esc(f.label)}${block?see:""}</span></div>`;
  }).join("");
  return `<div class="fails">${rows}</div>`;
}
function methodTags(s){
  const t=[];
  if(s.connection_live) t.push(`<span class="tag live">● live · ${esc(s.connection.replace('live walker','auto-sync'))}</span>`);
  else t.push(`<span class="tag frozen">◦ ${esc(s.connection)}</span>`);
  if(s.access_level==="read + can draft") t.push(`<span class="tag rw">read + draft</span>`);
  else t.push(`<span class="tag">read-only</span>`);
  return `<div class="meta">${t.join("")}</div>`;
}
function srcCard(s){
  const attn = s.health==="attention";
  const off = s.health==="disconnected";
  const cls = attn ? "attn" : (s.health==="healthy" ? "rec" : (off?"off":""));
  const foot = s.connection_live
    ? `<span class="fresh">${esc(ago(s.last_synced))}</span>
       <button class="refresh" data-refresh="${esc(s.id)}"><span class="spin"></span>Refresh</button>`
    : `<span class="fresh">frozen snapshot</span><span class="frozen-note">re-import to update</span>`;
  return `
  <div class="src ${cls}" id="src-${esc(s.id)}">
    <div class="top">
      <div>
        <div class="nm">${esc(s.name)}</div>
        <div class="via">via ${esc(s.via)}</div>
      </div>
      ${pill(s.consent_category)}
    </div>
    <div class="came">${esc(s.came_in)}</div>
    ${methodTags(s)}
    <div class="src-can" style="font-size:12.5px;color:var(--muted);margin-top:8px">${esc(s.access_can)}</div>
    ${failLines(s)}
    <div class="foot">${foot}</div>
  </div>`;
}
function render(d){
  document.getElementById("stamp").textContent = "live · read "+ago(d.generated_at);
  const dot=document.getElementById("brandDot");
  dot.style.background = d.headline.need_attention>0 ? "var(--amber)" : "var(--sage)";
  dot.style.boxShadow = "0 0 0 4px "+(d.headline.need_attention>0?"rgba(232,161,60,.18)":"rgba(111,158,134,.16)");
  const can = d.capability.can.length ? `<p class="can"><span class="lead">can</span> ${esc(d.capability.can.join(", "))}.</p>` : "";
  const cant = d.capability.cant.length ? `<p class="cant"><span class="lead no">can't yet</span> ${esc(d.capability.cant.join("; "))}.</p>` : "";
  const band = `
  <div class="band">
    <div class="row1">
      <div class="stat"><b>${d.headline.connected}</b><span>sources connected</span></div>
      <div class="stat ${d.headline.need_attention?'warn':''}"><b>${d.headline.need_attention}</b><span>need attention</span></div>
      ${d.headline.disconnected?`<div class="stat"><b style="color:var(--muted)">${d.headline.disconnected}</b><span>not connected</span></div>`:""}
      <div class="stat"><b style="font-size:15px;color:var(--muted);font-family:Inter">${esc(ago(d.headline.last_activity))}</b><span>last activity</span></div>
    </div>
    <div class="cap">${can}${cant}</div>
  </div>`;
  let todo;
  if(d.needs_attention.length){
    todo = `<div class="todo">`+ d.needs_attention.map(a=>`
      <div class="card" data-jump="src-${esc(a.id)}">
        <span class="kind">${esc(a.kind)}</span>
        <div class="body">
          <div class="name">${esc(a.name)}</div>
          <div class="reason">${esc(a.reasons.join(" · "))}</div>
        </div>
        <span class="go">→</span>
      </div>`).join("") + `</div>`;
  } else {
    todo = `<div class="todo empty">Nothing needs you right now — every connected source is current.</div>`;
  }
  const order=["email","systems","files","loose"];
  const groupsHtml = order.map(g=>{
    const arr=(d.groups[g]||[]).slice().sort((a,b)=>{
      const rank=x=>x.health==="attention"?0:x.health==="idle"?1:x.health==="disconnected"?3:2;
      return rank(a)-rank(b);
    });
    if(!arr.length) return "";
    const m=GROUP_META[g];
    return `<div class="group">
      <div class="grouphead"><h2>${m.title}</h2><span class="count">${arr.length}</span><span class="hint">${m.hint}</span></div>
      <div class="grid">${arr.map(srcCard).join("")}</div>
    </div>`;
  }).join("");
  const addStrip = `
    <div class="eyebrow">Connect more</div>
    <div class="addstrip">
      <button class="add" data-add="folder"><div class="t">A folder</div><div class="d">point at a drive or shared folder</div></button>
      <button class="add" data-add="mailbox"><div class="t">A mailbox</div><div class="d">add another inbox</div></button>
      <button class="add" data-add="system"><div class="t">A system</div><div class="d">QuickBooks, Wise, and more</div></button>
      <button class="add" data-add="request"><div class="t">Something else</div><div class="d">request a connector to be built</div></button>
    </div>`;
  const gaps = `<div class="gaps"><b>What the brain is honest about not tracking yet:</b>
    <ul>${d.known_gaps.map(g=>`<li>${esc(g)}</li>`).join("")}</ul></div>`;
  const sov = `<div class="sov">
    <span class="lock">🔒 ${esc(d.sovereignty)}</span>
    <span class="req">Need a source the brain can't reach yet? <a data-add="request">Request a connector</a></span>
  </div>`;
  document.getElementById("root").innerHTML =
    band +
    `<div class="eyebrow">Needs your attention</div>` + todo +
    `<div class="eyebrow">Your sources</div>` + groupsHtml +
    addStrip + gaps + sov;
  wire();
}
function wire(){
  document.querySelectorAll("[data-jump]").forEach(el=>el.addEventListener("click",()=>{
    const t=document.getElementById(el.getAttribute("data-jump"));
    if(t){t.scrollIntoView({behavior:"smooth",block:"center"});t.animate([{boxShadow:"0 0 0 2px var(--amber)"},{boxShadow:"0 0 0 1px #5a4a2b"}],{duration:1200});}
  }));
  document.querySelectorAll("[data-refresh]").forEach(btn=>btn.addEventListener("click",async e=>{
    e.stopPropagation();
    const id=btn.getAttribute("data-refresh");
    btn.classList.add("loading");btn.disabled=true;
    try{
      await call({action:"refresh",source_id:id});
      btn.innerHTML='<span class="spin"></span>Syncing…';
      setTimeout(load, 2500);
    }catch(err){ btn.classList.remove("loading");btn.disabled=false; btn.textContent="Retry"; }
  }));
  document.querySelectorAll("[data-see]").forEach(a=>a.addEventListener("click",ev=>{
    ev.stopPropagation();
    alert("A per-file list needs a real anchor the brain doesn't expose yet — flagged in “what the brain doesn't track.” Next build wires this to the actual failed-item list.");
  }));
  document.querySelectorAll("[data-add]").forEach(b=>b.addEventListener("click",()=>{
    const k=b.getAttribute("data-add");
    const msg = k==="request"
      ? "Request-a-connector: this is the permanent path — walkers and MCPs keep changing as other companies ship AI products. Next build routes this to the connector-request queue."
      : "Connect-more ("+k+"): single-source add flow — the founding sweep already pulled everything reachable through the CEO login. Next build wires this to the point-at-source flow.";
    alert(msg);
  }));
}
async function load(){
  try{
    const d = await call({action:"summary"});
    if(!d.ok) throw new Error(d.error||"brain error");
    render(d);
  }catch(err){
    document.getElementById("stamp").textContent="couldn't reach the brain";
    document.getElementById("root").innerHTML =
      `<div class="err">Couldn't read the brain live: ${esc(err.message)}.<br>The command center only ever shows real state — it won't guess. Try again in a moment.</div>`;
  }
}
load();
</script>
</body>
</html>
