<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Brain · Command Center — HireKraft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#ffffff; --wash:#f6f7f9; --ink:#14181d; --ink-2:#333d49; --line:#e4e7ec; --line-2:#eef1f4;
    --muted:#5f6b78; --muted-2:#8a97a6;
    --sage:#3f7d63; --sage-bg:#eef6f1; --amber:#b9741a; --amber-bg:#fdf5e9; --amber-line:#f0dcb8;
    --sky:#2f6f97; --violet:#6a5bb0;
    --radius:14px; --shadow:0 1px 2px rgba(20,24,29,.04), 0 8px 24px -16px rgba(20,24,29,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--wash); color:var(--ink);
    font-family:Inter,system-ui,sans-serif; -webkit-font-smoothing:antialiased;
    line-height:1.45; padding:28px 20px 90px;
  }
  .wrap{max-width:1080px;margin:0 auto}
  a{color:inherit}
  .mast{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .brand{display:flex;align-items:baseline;gap:12px}
  .brand h1{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.01em;margin:0}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 4px rgba(63,125,99,.14);align-self:center}
  .brand .sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);letter-spacing:.02em}
  .stamp{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2)}
  .band{margin-top:18px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);padding:20px 22px;box-shadow:var(--shadow)}
  .band .row1{display:flex;align-items:baseline;gap:26px;flex-wrap:wrap}
  .stat{display:flex;align-items:baseline;gap:9px}
  .stat b{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:-.02em}
  .stat span{font-size:13px;color:var(--muted)}
  .stat.warn b{color:var(--amber)}
  .cap{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-size:14px;color:var(--ink-2)}
  .cap .lead{color:var(--sage);font-weight:600}
  .cap .lead.no{color:var(--muted-2)}
  .cap p{margin:2px 0}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin:34px 2px 12px;display:flex;align-items:center;gap:10px}
  .eyebrow::after{content:"";height:1px;flex:1;background:var(--line)}
  .todo{display:grid;gap:10px}
  .todo .card{display:flex;align-items:center;gap:14px;border:1px solid var(--amber-line);border-left:4px solid var(--amber);background:var(--amber-bg);border-radius:12px;padding:13px 16px;cursor:pointer;transition:transform .12s ease, box-shadow .12s ease}
  .todo .card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .todo .kind{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--amber);border:1px solid var(--amber-line);border-radius:6px;padding:3px 7px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;background:#fff}
  .todo .body{flex:1;min-width:0}
  .todo .name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px}
  .todo .reason{font-size:13px;color:#8a6a33;margin-top:1px}
  .todo .go{font-size:20px;color:var(--amber);opacity:.85}
  .todo.empty{border:1px dashed var(--line);border-radius:12px;padding:16px;color:var(--muted);font-size:14px;text-align:center;background:var(--paper)}
  .group{margin-bottom:6px}
  .grouphead{display:flex;align-items:baseline;gap:10px;margin:26px 2px 12px}
  .grouphead h2{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin:0}
  .grouphead .count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2)}
  .grouphead .hint{font-size:12px;color:var(--muted-2);margin-left:auto}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  .src{border:1px solid var(--line);border-radius:12px;background:var(--paper);padding:14px 15px;position:relative;transition:border-color .12s ease, box-shadow .12s ease}
  .src:hover{box-shadow:var(--shadow)}
  .src.rec{background:var(--wash)}
  .src.attn{border-color:var(--amber-line);box-shadow:0 0 0 1px var(--amber-line)}
  .src.attn::before{content:"";position:absolute;left:-1px;top:12px;bottom:12px;width:3px;border-radius:3px;background:var(--amber)}
  .src.off{opacity:.55}
  .src .top{display:flex;align-items:flex-start;gap:10px}
  .src .nm{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;letter-spacing:-.01em;word-break:break-word}
  .src .via{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted-2);margin-top:2px}
  .pill{margin-left:auto;font-size:10px;font-family:'JetBrains Mono',monospace;padding:3px 7px;border-radius:20px;white-space:nowrap;border:1px solid var(--line);color:var(--muted);background:#fff}
  .pill.company{color:var(--sky);border-color:#cfe0ea}
  .pill.personal{color:var(--violet);border-color:#ddd8ef}
  .src .came{font-size:14px;margin-top:11px;color:var(--ink-2)}
  .src .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .tag{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:2px 7px;background:#fff}
  .tag.live{color:var(--sage);border-color:#cfe6da;background:var(--sage-bg)}
  .tag.frozen{color:#a2662f;border-color:#ecd9c2;background:var(--amber-bg)}
  .tag.rw{color:var(--sky);border-color:#cfe0ea}
  .src .fails{margin-top:10px;display:grid;gap:5px}
  .fail{font-size:12.5px;display:flex;gap:8px;align-items:baseline}
  .fail .n{font-family:'JetBrains Mono',monospace;font-weight:500}
  .fail.block .n{color:var(--amber)} .fail.block{color:#8a6a33}
  .fail.soft{color:var(--muted-2)}
  .fail a{color:var(--amber);text-decoration:underline;text-underline-offset:2px;cursor:pointer;font-size:12px}
  .src .foot{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-2)}
  .fresh{font-size:12px;color:var(--muted-2);font-family:'JetBrains Mono',monospace}
  .btn{margin-left:auto;font-size:12px;color:var(--ink);background:var(--wash);border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer;display:inline-flex;gap:6px;align-items:center;transition:background .12s, border-color .12s}
  .btn:hover{background:#eef1f4;border-color:#d3d8df}
  .btn.up{margin-left:0}
  .btn:disabled{opacity:.6;cursor:default}
  .btn .spin{width:11px;height:11px;border:2px solid var(--muted-2);border-top-color:var(--ink);border-radius:50%;display:none}
  .btn.loading .spin{display:inline-block;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .frozen-note{margin-left:auto;font-size:12px;color:#a2662f}
  .addstrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:14px}
  .add{border:1px dashed var(--line);border-radius:12px;background:var(--paper);color:var(--ink);padding:16px 14px;text-align:left;cursor:pointer;transition:border-color .12s,background .12s}
  .add:hover{border-color:var(--sage);background:var(--sage-bg)}
  .add .t{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px}
  .add .d{font-size:12px;color:var(--muted-2);margin-top:3px}
  .sov{position:sticky;bottom:0;margin:36px -20px -90px;padding:16px 20px;background:linear-gradient(180deg,rgba(246,247,249,0),var(--wash) 45%);display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap}
  .sov .lock{font-size:13px;color:var(--sage);display:flex;align-items:center;gap:8px}
  .sov .req{font-size:13px;color:var(--muted);border-left:1px solid var(--line);padding-left:12px}
  .sov .req a{color:var(--ink);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
  .gaps{margin-top:22px;font-size:12px;color:var(--muted-2);border-top:1px dashed var(--line);padding-top:12px}
  .gaps b{color:var(--muted);font-weight:600}
  .gaps ul{margin:6px 0 0;padding-left:18px}
  .loading-screen{display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 0;color:var(--muted)}
  .loading-screen .brainpulse{width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 50% 40%,var(--sage),#bcd8c9);box-shadow:0 0 0 0 rgba(63,125,99,.4);animation:pulse 1.6s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(63,125,99,.3)}100%{box-shadow:0 0 0 26px rgba(63,125,99,0)}}
  .err{border:1px solid #e6c2c2;background:#fbf0f0;color:#8f3a3a;border-radius:12px;padding:16px;font-size:14px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 12px 30px -12px rgba(0,0,0,.4);z-index:50;max-width:520px;opacity:0;transition:opacity .18s;pointer-events:none}
  .toast.show{opacity:1;pointer-events:auto}
  .toast a{color:#9fd3ba;text-decoration:underline}
  .modal-bg{position:fixed;inset:0;background:rgba(20,24,29,.35);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow:auto}
  .modal-bg.show{display:flex}
  .modal{background:var(--paper);border:1px solid var(--line);border-radius:14px;max-width:640px;width:100%;box-shadow:0 24px 60px -20px rgba(20,24,29,.4)}
  .modal .mhead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line-2)}
  .modal .mhead h3{font-family:'Space Grotesk',sans-serif;font-size:16px;margin:0}
  .modal .mhead .x{cursor:pointer;color:var(--muted-2);font-size:20px;line-height:1}
  .modal .mbody{padding:14px 20px 20px;max-height:60vh;overflow:auto}
  .fitem{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line-2);flex-wrap:wrap}
  .fitem:last-child{border-bottom:0}
  .fitem .fn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);word-break:break-all;flex:1}
  .fitem .fb{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 6px;border-radius:6px;white-space:nowrap}
  .fb.open{color:var(--amber);background:var(--amber-bg);border:1px solid var(--amber-line)}
  .fb.closed{color:var(--muted-2);background:var(--wash);border:1px solid var(--line)}
  .fitem .fx{font-size:12px;color:var(--ink-2);flex-basis:100%;margin-top:2px}
  .mfield{display:flex;flex-direction:column;gap:6px;margin:10px 0}
  .mfield label{font-size:12px;color:var(--muted);font-weight:600}
  .mfield input,.mfield select{border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  .mprimary{background:var(--sage);color:#fff;border:0;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif}
  .mprimary:hover{background:#356b54}
  .mnote{font-size:12px;color:var(--muted-2);margin-top:8px;line-height:1.5}
  @media (max-width:520px){body{padding:20px 14px 90px} .stat b{font-size:24px} .grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="mast">
    <div class="brand">
      <span class="dot" id="brandDot"></span>
      <h1>Brain · Command Center</h1>
      <span class="sub">HireKraft</span>
    </div>
    <div class="stamp" id="stamp">reading your brain…</div>
  </div>
  <div id="root">
    <div class="loading-screen">
      <div class="brainpulse"></div>
      <div>Reading your brain, live…</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal"><div class="mhead"><h3 id="modalTitle"></h3><span class="x" id="modalClose">×</span></div><div class="mbody" id="modalBody"></div></div></div>

<script>
const FN = "https://uvdoompnnypmneyrvtas.supabase.co/functions/v1/brain-command-center";
const ANON = "sb_publishable_joP87JJiePfN3k1uPoxxVA_DLGT1zv5";
let LAST = null;

function esc(s){return String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function ago(iso){
  if(!iso) return "never synced";
  const d=new Date(iso), s=(Date.now()-d.getTime())/1000;
  if(s<90) return "just now";
  if(s<3600) return Math.round(s/60)+"m ago";
  if(s<86400) return Math.round(s/3600)+"h ago";
  return Math.round(s/86400)+"d ago";
}
async function call(body){
  const r = await fetch(FN,{method:"POST",headers:{"Content-Type":"application/json","apikey":ANON,"Authorization":"Bearer "+ANON},body:JSON.stringify(body)});
  if(!r.ok) throw new Error("brain returned "+r.status);
  return r.json();
}
let toastT;
function toast(html, ms){
  const el=document.getElementById("toast"); el.innerHTML=html; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"), ms||4200);
}
function openModal(title, bodyHtml){
  document.getElementById("modalTitle").textContent=title;
  document.getElementById("modalBody").innerHTML=bodyHtml;
  document.getElementById("modalBg").classList.add("show");
}
function closeModal(){ document.getElementById("modalBg").classList.remove("show"); }

function pill(cat){
  if(cat===2||cat===3) return '<span class="pill personal">personal · your data</span>';
  return '<span class="pill company">company-owned</span>';
}
function failLines(s){
  if(!s.fail_reasons || !s.fail_reasons.length) return "";
  const rows = s.fail_reasons.map(function(f){
    const cls = f.attention ? "block" : "soft";
    const see = f.attention ? ' <a data-see="'+esc(s.id)+'" data-name="'+esc(s.name)+'">see which</a>' : "";
    return '<div class="fail '+cls+'"><span class="n">'+f.count+'</span><span>'+esc(f.label)+see+'</span></div>';
  }).join("");
  return '<div class="fails">'+rows+'</div>';
}
function methodTags(s){
  const t=[];
  if(s.connection_live) t.push('<span class="tag live">● live · '+esc(s.connection.replace('live walker','auto-sync'))+'</span>');
  else t.push('<span class="tag frozen">◦ '+esc(s.connection)+'</span>');
  if(s.access_level==="read + can draft") t.push('<span class="tag rw">read + draft</span>');
  else t.push('<span class="tag">read-only</span>');
  return '<div class="meta">'+t.join("")+'</div>';
}
function srcCard(s){
  const attn = s.health==="attention";
  const off = s.health==="disconnected";
  const cls = attn ? "attn" : (s.health==="healthy" ? "rec" : (off?"off":""));
  let footInner;
  if(off){
    footInner = '<span class="fresh">not connected</span>';
  } else if(s.connection_live){
    footInner = '<span class="fresh">'+esc(ago(s.last_synced))+'</span>'+
       '<button class="btn" data-refresh="'+esc(s.id)+'"><span class="spin"></span>Refresh</button>';
  } else {
    footInner = '<span class="fresh">frozen snapshot</span><span class="frozen-note">re-import to update</span>';
  }
  const upgrade = s.access_upgradable
    ? '<div style="margin-top:8px"><button class="btn up" data-grant="'+esc(s.id)+'" data-name="'+esc(s.name)+'">⇧ Upgrade to read-write</button></div>' : "";
  return ''+
  '<div class="src '+cls+'" id="src-'+esc(s.id)+'">'+
    '<div class="top">'+
      '<div>'+
        '<div class="nm">'+esc(s.name)+'</div>'+
        '<div class="via">via '+esc(s.via)+'</div>'+
      '</div>'+
      pill(s.consent_category)+
    '</div>'+
    '<div class="came">'+esc(s.came_in)+'</div>'+
    methodTags(s)+
    '<div class="src-can" style="font-size:12.5px;color:var(--muted);margin-top:8px">'+esc(s.access_can)+'</div>'+
    upgrade+
    failLines(s)+
    '<div class="foot">'+footInner+'</div>'+
  '</div>';
}
const GROUP_META = {
  email:   {title:"Email",            hint:"mailboxes the brain reads"},
  systems: {title:"Systems",          hint:"QuickBooks, Wise and other tools"},
  files:   {title:"Files & folders",  hint:"drives and shared folders"},
  loose:   {title:"Loose files",      hint:"one-off imports — the junk drawer"}
};
function render(d){
  LAST=d;
  document.getElementById("stamp").textContent = "live · read "+ago(d.generated_at);
  const dot=document.getElementById("brandDot");
  dot.style.background = d.headline.need_attention>0 ? "var(--amber)" : "var(--sage)";
  dot.style.boxShadow = "0 0 0 4px "+(d.headline.need_attention>0?"rgba(185,116,26,.16)":"rgba(63,125,99,.14)");
  const can = d.capability.can.length ? '<p class="can"><span class="lead">can</span> '+esc(d.capability.can.join(", "))+'.</p>' : "";
  const cant = d.capability.cant.length ? '<p class="cant"><span class="lead no">can\'t yet</span> '+esc(d.capability.cant.join("; "))+'.</p>' : "";
  const band =
  '<div class="band">'+
    '<div class="row1">'+
      '<div class="stat"><b>'+d.headline.connected+'</b><span>sources connected</span></div>'+
      '<div class="stat '+(d.headline.need_attention?'warn':'')+'"><b>'+d.headline.need_attention+'</b><span>need attention</span></div>'+
      (d.headline.disconnected?'<div class="stat"><b style="color:var(--muted)">'+d.headline.disconnected+'</b><span>not connected</span></div>':"")+
      '<div class="stat"><b style="font-size:15px;color:var(--muted);font-family:Inter">'+esc(ago(d.headline.last_activity))+'</b><span>last activity</span></div>'+
    '</div>'+
    '<div class="cap">'+can+cant+'</div>'+
  '</div>';
  let todo;
  if(d.needs_attention.length){
    todo = '<div class="todo">'+ d.needs_attention.map(function(a){ return
      '<div class="card" data-jump="src-'+esc(a.id)+'">'+
        '<span class="kind">'+esc(a.kind)+'</span>'+
        '<div class="body">'+
          '<div class="name">'+esc(a.name)+'</div>'+
          '<div class="reason">'+esc(a.reasons.join(" · "))+'</div>'+
        '</div>'+
        '<span class="go">→</span>'+
      '</div>'; }).join("") + '</div>';
  } else {
    todo = '<div class="todo empty">Nothing needs you right now — every connected source is current.</div>';
  }
  const order=["email","systems","files","loose"];
  const groupsHtml = order.map(function(g){
    const arr=(d.groups[g]||[]).slice().sort(function(a,b){
      const rank=function(x){return x.health==="attention"?0:x.health==="idle"?1:x.health==="disconnected"?3:2;};
      return rank(a)-rank(b);
    });
    if(!arr.length) return "";
    const m=GROUP_META[g];
    return '<div class="group">'+
      '<div class="grouphead"><h2>'+m.title+'</h2><span class="count">'+arr.length+'</span><span class="hint">'+m.hint+'</span></div>'+
      '<div class="grid">'+arr.map(srcCard).join("")+'</div>'+
    '</div>';
  }).join("");
  const addStrip =
    '<div class="eyebrow">Connect more</div>'+
    '<div class="addstrip">'+
      '<button class="add" data-add="folder"><div class="t">A folder</div><div class="d">point at a drive or shared folder</div></button>'+
      '<button class="add" data-add="mailbox"><div class="t">A mailbox</div><div class="d">add another inbox</div></button>'+
      '<button class="add" data-add="system"><div class="t">A system</div><div class="d">QuickBooks, Wise, and more</div></button>'+
      '<button class="add" data-add="request"><div class="t">Something else</div><div class="d">request a connector to be built</div></button>'+
    '</div>';
  const gaps = '<div class="gaps"><b>What the brain is honest about not tracking yet:</b>'+
    '<ul>'+d.known_gaps.map(function(g){return '<li>'+esc(g)+'</li>';}).join("")+'</ul></div>';
  const sov = '<div class="sov">'+
    '<span class="lock">🔒 '+esc(d.sovereignty)+'</span>'+
    '<span class="req">Need a source the brain can\'t reach yet? <a data-add="request">Request a connector</a></span>'+
  '</div>';
  document.getElementById("root").innerHTML =
    band +
    '<div class="eyebrow">Needs your attention</div>' + todo +
    '<div class="eyebrow">Your sources</div>' + groupsHtml +
    addStrip + gaps + sov;
  wire();
}

async function doRefresh(id, btn){
  btn.classList.add("loading"); btn.disabled=true;
  const label = btn.childNodes[btn.childNodes.length-1];
  const setLabel = function(t){ label.textContent = t; };
  try{
    await call({action:"refresh", source_id:id});
    setLabel("Syncing…");
    const res = await call({action:"process_now", source_id:id, max_batches:3});
    const n = res.processed || 0;
    toast(n>0 ? "Re-ingested "+n+" item"+(n===1?"":"s")+" — refreshing view…" : "Refreshed — nothing new to pull right now.");
    setTimeout(load, 900);
  }catch(err){
    btn.classList.remove("loading"); btn.disabled=false; setLabel("Retry");
    toast("Couldn't refresh: "+esc(err.message));
  }
}

async function showFailed(id, name){
  openModal("Items that failed — "+name, '<div style="color:var(--muted);font-size:13px">Loading the real failed-item list…</div>');
  try{
    const d = await call({action:"failed_items", source_id:id});
    if(!d.items.length){ document.getElementById("modalBody").innerHTML = '<div style="color:var(--muted)">No recorded failed items for this source.</div>'; return; }
    const open = d.items.filter(function(i){return i.open;}), closed = d.items.filter(function(i){return !i.open;});
    const row = function(i){ return '<div class="fitem">'+
      '<span class="fn">'+esc(i.name)+'</span>'+
      '<span class="fb '+(i.open?'open':'closed')+'">'+esc(i.bucket)+'</span>'+
      '<div class="fx">'+esc(i.fix)+(i.occurrences>1?' · seen '+i.occurrences+'×':"")+'</div>'+
    '</div>'; };
    let html="";
    if(open.length) html += '<div style="font-size:12px;color:var(--amber);font-weight:600;margin-bottom:4px">'+open.length+' still open</div>' + open.map(row).join("");
    if(closed.length) html += '<div style="font-size:12px;color:var(--muted-2);font-weight:600;margin:14px 0 4px">'+closed.length+' already handled or self-clearing</div>' + closed.map(row).join("");
    document.getElementById("modalBody").innerHTML = html;
  }catch(err){
    document.getElementById("modalBody").innerHTML = '<div class="err">Couldn\'t load failed items: '+esc(err.message)+'</div>';
  }
}

function showGrant(id, name){
  const isQb = /quickbooks/i.test(name);
  openModal("Upgrade access — "+name,
    '<p style="font-size:14px;color:var(--ink-2);margin-top:0">This opens a real consent screen. '+(isQb?"You'll authorize QuickBooks read-write so the brain can create and send invoices.":"You'll authorize broader access.")+' Nothing changes until you complete consent.</p>'+
    '<div class="mfield"><button class="mprimary" id="grantGo">Open consent to upgrade</button></div>'+
    '<div class="mnote">Access equals whatever the signed-in account is allowed to do — enforced when the brain reads, not decided here.</div>');
  document.getElementById("grantGo").onclick = async function(){
    try{
      const d = await call({action:"grant", source_id:id, mode:"upgrade", scope_profile:"read_write"});
      window.open(d.consent_url, "_blank");
      closeModal(); toast("Consent opened in a new tab. Finish signing in to apply the upgrade.");
    }catch(err){ toast("Couldn't start upgrade: "+esc(err.message)); }
  };
}

function showAdd(kind){
  if(kind==="request"){
    openModal("Request a connector",
      '<p style="font-size:14px;color:var(--ink-2);margin-top:0">Tell us the source you want the brain to reach. Walkers and connectors keep being built as other products ship — this is the permanent path for anything not yet wired.</p>'+
      '<div class="mfield"><label>What source?</label><input id="reqWhat" placeholder="e.g. Dropbox folder, Slack workspace, our ATS"></div>'+
      '<div class="mfield"><button class="mprimary" id="reqGo">Send request</button></div>'+
      '<div class="mnote">This is logged for the build queue. Nothing connects automatically.</div>');
    document.getElementById("reqGo").onclick = function(){ closeModal(); toast('Request noted: "'+esc(document.getElementById("reqWhat").value||"unspecified")+'". It\'ll enter the connector build queue.'); };
    return;
  }
  if(kind==="mailbox"){
    openModal("Connect a mailbox",
      '<p style="font-size:14px;color:var(--ink-2);margin-top:0">Add another inbox. This opens Google\'s real consent screen — sign in as that mailbox\'s owner. The brain reads only what that account can access.</p>'+
      '<div class="mfield"><label>Mailbox address</label><input id="mbx" placeholder="name@hirekraft.ai"></div>'+
      '<div class="mfield"><button class="mprimary" id="mbxGo">Create & open consent</button></div>'+
      '<div class="mnote">Personal-mixed posture by default: ambiguous personal content is held back conservatively.</div>');
    document.getElementById("mbxGo").onclick = async function(){
      const mailbox=document.getElementById("mbx").value.trim();
      if(!mailbox){ toast("Enter a mailbox address."); return; }
      try{
        const d = await call({action:"add_source", kind:"mailbox", mailbox:mailbox});
        window.open(d.consent_url,"_blank"); closeModal();
        toast("Consent opened for "+esc(mailbox)+". Finish signing in and the walker starts gathering.");
        setTimeout(load, 1500);
      }catch(err){ toast("Couldn't create source: "+esc(err.message)); }
    };
    return;
  }
  if(kind==="folder"){
    openModal("Connect a folder",
      '<p style="font-size:14px;color:var(--ink-2);margin-top:0">Point the brain at a shared drive. Enter its Drive ID (from the drive\'s URL). Company-owned drives connect through the owner\'s login; the brain reads what that login can reach.</p>'+
      '<div class="mfield"><label>Shared drive ID</label><input id="drv" placeholder="0A… (from drive.google.com/drive/folders/…)"></div>'+
      '<div class="mfield"><button class="mprimary" id="drvGo">Create & open consent</button></div>'+
      '<div class="mnote">Setup sweep: to connect every company-owned drive at once, use "Request a connector" and ask for a full sweep — that runs one authorize across all owned drives.</div>');
    document.getElementById("drvGo").onclick = async function(){
      const drive_id=document.getElementById("drv").value.trim();
      if(!drive_id){ toast("Enter a shared drive ID."); return; }
      try{
        const d = await call({action:"add_source", kind:"folder", drive_id:drive_id});
        window.open(d.consent_url,"_blank"); closeModal();
        toast("Folder source created. Consent opened — finish it and the walker gathers the drive.");
        setTimeout(load, 1500);
      }catch(err){ toast("Couldn't create source: "+esc(err.message)); }
    };
    return;
  }
  if(kind==="system"){
    openModal("Connect a system",
      '<p style="font-size:14px;color:var(--ink-2);margin-top:0">Connect a business system. This opens the provider\'s real authorize screen.</p>'+
      '<div class="mfield"><label>Which system?</label><select id="sys"><option value="qbo">QuickBooks</option><option value="wise">Wise</option></select></div>'+
      '<div class="mfield"><button class="mprimary" id="sysGo">Create & open consent</button></div>');
    document.getElementById("sysGo").onclick = async function(){
      const system=document.getElementById("sys").value;
      try{
        const d = await call({action:"add_source", kind:"system", system:system});
        window.open(d.consent_url,"_blank"); closeModal();
        toast("Consent opened for "+esc(system)+". Finish authorizing to connect.");
        setTimeout(load, 1500);
      }catch(err){ toast("Couldn't create source: "+esc(err.message)); }
    };
    return;
  }
}

function wire(){
  document.querySelectorAll("[data-jump]").forEach(function(el){ el.addEventListener("click",function(){
    const t=document.getElementById(el.getAttribute("data-jump"));
    if(t){t.scrollIntoView({behavior:"smooth",block:"center"});t.animate([{boxShadow:"0 0 0 2px var(--amber)"},{boxShadow:"0 0 0 1px var(--amber-line)"}],{duration:1200});}
  }); });
  document.querySelectorAll("[data-refresh]").forEach(function(btn){ btn.addEventListener("click",function(e){
    e.stopPropagation(); doRefresh(btn.getAttribute("data-refresh"), btn);
  }); });
  document.querySelectorAll("[data-see]").forEach(function(a){ a.addEventListener("click",function(ev){
    ev.stopPropagation(); showFailed(a.getAttribute("data-see"), a.getAttribute("data-name"));
  }); });
  document.querySelectorAll("[data-grant]").forEach(function(b){ b.addEventListener("click",function(ev){
    ev.stopPropagation(); showGrant(b.getAttribute("data-grant"), b.getAttribute("data-name"));
  }); });
  document.querySelectorAll("[data-add]").forEach(function(b){ b.addEventListener("click",function(){ showAdd(b.getAttribute("data-add")); }); });
}
document.getElementById("modalClose").onclick=closeModal;
document.getElementById("modalBg").addEventListener("click",function(e){ if(e.target.id==="modalBg") closeModal(); });

async function load(){
  try{
    const d = await call({action:"summary"});
    if(!d.ok) throw new Error(d.error||"brain error");
    render(d);
  }catch(err){
    document.getElementById("stamp").textContent="couldn't reach the brain";
    document.getElementById("root").innerHTML =
      '<div class="err">Couldn\'t read the brain live: '+esc(err.message)+'.<br>The command center only ever shows real state — it won\'t guess. Try again in a moment.</div>';
  }
}
load();
</script>
</body>
</html>
